services:
  postgres:
    image: postgres:16
    container_name: coreai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coreai
      POSTGRES_USER: coreai
      POSTGRES_PASSWORD: 1@1@Coreai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreai -d coreai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: coreai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: coreai-backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: "postgresql://coreai:1%401%40Coreai@postgres:5432/coreai"
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: https://triven.ai
      BACKEND_URL: https://triven.ai/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8787:8787"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        API_INTERNAL_URL: http://backend:8787
        NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyB3_E0DdwP9xw0i8Kt-yd4baQMCu0yf7Ds"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "collabglam-production-b3c42.firebaseapp.com"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "collabglam-production-b3c42"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "collabglam-production-b3c42.firebasestorage.app"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "781591295257"
        NEXT_PUBLIC_FIREBASE_APP_ID: "1:781591295257:web:782479892925f6057dc188"
    container_name: coreai-frontend
    restart: unless-stopped
    env_file:
      - apps/frontend/.env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      API_INTERNAL_URL: http://backend:8787
      NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyB3_E0DdwP9xw0i8Kt-yd4baQMCu0yf7Ds"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "collabglam-production-b3c42.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "collabglam-production-b3c42"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "collabglam-production-b3c42.firebasestorage.app"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "781591295257"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:781591295257:web:782479892925f6057dc188"
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  redis_data: