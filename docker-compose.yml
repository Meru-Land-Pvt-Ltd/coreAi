services:
  postgres:
    image: postgres:16
    container_name: coreai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coreai
      POSTGRES_USER: coreai
      POSTGRES_PASSWORD: Priyanshu30
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreai -d coreai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: coreai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: coreai-backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://coreai:Priyanshu30@postgres:5432/coreai
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      PORT: 8787
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8787:8787"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8787
    container_name: coreai-frontend
    restart: unless-stopped
    env_file:
      - apps/frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8787
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data: